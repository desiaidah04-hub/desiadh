<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Roti Manis</title>
    <link rel="stylesheet" href="style.css">
</head>

<script>
    if (localStorage.getItem("login") !== "true") {
        window.location.href = "../login.html";
    }
</script>

<body>

    <header>
        <h1>🍞 Toko Roti Manis</h1>
        <h3>Fresh setiap hari!</h3>
    </header>

    <section class="produk">

        <div class="card">
            <h2>Roti Coklat</h2>
            <p>Rp 10.000</p>
            <button onclick="tambahKeranjang('Roti Coklat',10000)">Beli</button>
        </div>

        <div class="card">
            <h2>Roti Keju</h2>
            <p>Rp 12.000</p>
            <button onclick="tambahKeranjang('Roti Keju',12000)">Beli</button>
        </div>

        <div class="card">
            <h2>Roti Strawberry</h2>
            <p>Rp 11.000</p>
            <button onclick="tambahKeranjang('Roti Strawberry',11000)">Beli</button>
        </div>

    </section>

    <section class="keranjang">
        <h2>🛒 Keranjang</h2>
        <ul id="listKeranjang"></ul>
        <h3>Total: Rp <span id="total">0</span></h3>
    </section>

    <script src="script.js"></script>
</body>
</html>
